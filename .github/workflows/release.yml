name: Build and Release
on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - run: npm ci
      - run: npx electron-builder --linux --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm ci
      - run: npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm ci
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          set -x
          gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          artifacts=()
          for d in linux windows macos; do
            for f in "$d"/*; do
              case "$f" in
                */builder-debug.yml) ;;
                *-unpacked) ;;
                *) [ -f "$f" ] && artifacts+=("$f") ;;
              esac
            done
          done
          gh release create "${{ github.ref_name }}" \
            "${artifacts[@]}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  update-repo:
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux
      - name: Find pacman package
        run: |
          PKG=$(ls *.pkg.tar.zst | head -1)
          echo "PKG=$PKG" >> $GITHUB_ENV
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo
      - name: Update pacman repo
        run: |
          cd repo
          cp "../$PKG" .
          repo-add bananadashboard.db.tar.gz "$PKG"
          # Keep only the latest package, remove older ones
          LATEST=$(ls -t bananadashboard-*.pkg.tar.zst | head -1)
          for f in bananadashboard-*.pkg.tar.zst; do
            [ "$f" = "$LATEST" ] && continue
            rm -f "$f"
          done
          repo-add bananadashboard.db.tar.gz "$LATEST"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update repo to ${{ github.ref_name }}"
          git push

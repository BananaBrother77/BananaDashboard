name: Build and Release
run-name: ${{ github.ref_name }}
on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - run: npm ci
      - run: npx electron-builder --linux --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm ci
      - run: npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm ci
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          set -x
          gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          artifacts=()
          for d in linux windows macos; do
            for f in "$d"/*; do
              case "$f" in
                */builder-debug.yml) ;;
                *-unpacked) ;;
                *) [ -f "$f" ] && artifacts+=("$f") ;;
              esac
            done
          done
          gh release create "${{ github.ref_name }}" \
            "${artifacts[@]}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BODY="$(gh release view "$RELEASE_TAG" --repo "$REPO" --json body --jq '.body' | head -c 4000)"
          curl -s -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$RELEASE_TAG" --arg url "https://github.com/$REPO/releases/tag/$RELEASE_TAG" --arg body "$BODY" '{
              "content": "<@&1495199325268217977>",
              "embeds": [{
                "title": "BananaDashboard \($tag)",
                "url": $url,
                "color": 8153788,
                "description": (if $body != "" then $body[0:200] else "A new release is out!" end),
                "fields": [
                  { "name": "Downloads", "value": "[GitHub Release](" + $url + ")", "inline": false }
                ],
                "footer": { "text": "BananaDashboard" }
              }]
            }')" "$DISCORD_WEBHOOK"

